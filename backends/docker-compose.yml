services:
  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/mqtt-auth-service/public:/var/www/mqtt/public
      - ./services/firmware-update-service/public:/var/www/ota/public
    depends_on:
      mqtt-php:
        condition: service_healthy
      ota-php:
        condition: service_healthy
    networks:
      - rows_network

  mqtt-php:
    build: services/mqtt-auth-service
    restart: unless-stopped
    volumes:
      - ./services/mqtt-auth-service:/var/www/mqtt
      - /var/www/mqtt/vendor
    env_file:
      - .env
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rows_network

  ota-php:
    build: services/firmware-update-service
    restart: unless-stopped
    volumes:
      - ./services/firmware-update-service:/var/www/ota
      - /var/www/ota/vendor
    env_file:
      - .env
    depends_on:
      firmware-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rows_network

  firmware-db:
    image: mysql:8.0.41
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/firmware-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rows_network

  mosquitto:
    image: iegomez/mosquitto-go-auth:2.1.0-mosquitto_1.6.14
    restart: unless-stopped
    ports:
      - 8883:8883
      - 8884:8884
      - 9001:9001
    volumes:
      - ./docker/mosquitto/certs:/etc/mosquitto/certs
      - ./docker/mosquitto/config/mosquitto.conf:/etc/mosquitto/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD", "true"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - rows_network

networks:
  rows_network:

volumes:
  db_data:
  mosquitto_data:
  mosquitto_log:
